<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆图纸生成器 - MARD 色号版</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f5f0eb;color:#2c2416;min-height:100vh}
header{background:linear-gradient(135deg,#e74c3c,#f39c12,#2ecc71,#3498db,#9b59b6);padding:24px 20px 18px;text-align:center;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15)}
header h1{font-size:28px;font-weight:700;letter-spacing:2px}
header p{font-size:14px;opacity:.85;margin-top:4px}
.container{max-width:1200px;margin:0 auto;padding:20px 16px}
.upload-area{border:3px dashed #ccc;border-radius:16px;padding:50px 20px;text-align:center;cursor:pointer;transition:all .25s;background:#faf8f5;margin-bottom:20px}
.upload-area:hover,.upload-area.dragover{border-color:#e67e22;background:#fef9ef}
.upload-area .icon{font-size:52px;margin-bottom:10px}
.upload-area .text{font-size:16px;color:#666}
.upload-area .hint{font-size:13px;color:#999;margin-top:4px}
.upload-area.has-image{padding:16px;border-style:solid;border-color:#27ae60;background:#f0faf4}
.upload-area.has-image .icon{font-size:28px;margin-bottom:0}
.upload-area input[type="file"]{display:none}
.preview-row{display:flex;gap:20px;margin-bottom:16px;align-items:flex-start;flex-wrap:wrap}
.preview-box{flex:1 1 280px;background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.preview-box h3{font-size:13px;color:#888;margin-bottom:8px;font-weight:500}
.preview-box .img-wrap{position:relative;display:flex;align-items:center;justify-content:center;min-height:120px;background:#f9f9f9;border-radius:8px;overflow:hidden}
.preview-box .img-wrap img,.preview-box .img-wrap canvas{max-width:100%;max-height:500px;display:block;border-radius:4px}
.preview-box .img-wrap .placeholder{color:#bbb;font-size:14px;padding:40px 0}
.preview-box .img-info{font-size:12px;color:#999;margin-top:6px;text-align:center}
.controls{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:14px}
.control-row{display:flex;flex-wrap:wrap;gap:16px 32px;margin-bottom:10px}
.control-row:last-child{margin-bottom:0}
.control-group{flex:1 1 160px;min-width:130px}
.control-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:3px}
.control-group label .val{color:#e67e22;font-weight:700}
.control-group input[type="range"]{width:100%;height:5px;-webkit-appearance:none;appearance:none;background:#e8e0d6;border-radius:3px;outline:none;cursor:pointer}
.control-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#e67e22;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.control-group input[type="range"]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#e67e22;cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-top:1px}
.control-group .desc{font-size:11px;color:#999;margin-top:2px}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;gap:3px;padding:5px 12px;border:1.5px solid #ccc;border-radius:6px;background:#fafafa;cursor:pointer;font-size:12px;font-weight:500;color:#555;transition:all .15s;white-space:nowrap}
.btn-icon:hover{border-color:#e67e22;color:#e67e22;background:#fef9ef}
.btn-icon.active{background:#e67e22;border-color:#e67e22;color:#fff}
.btn-icon:disabled{opacity:.4;cursor:not-allowed}
.btn-icon .ico{font-size:14px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.toggle-wrap{display:flex;align-items:center;gap:8px;margin-top:2px}
.toggle-wrap .toggle-label{font-size:11px;color:#888;white-space:nowrap}
.toggle-switch{position:relative;width:36px;height:20px;background:#bbb;border-radius:10px;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle-switch.active{background:#e67e22}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.active .knob{left:18px}
.conditional-area{margin-top:6px;padding:8px 12px;background:#faf8f5;border-radius:8px;border:1px solid #eee;display:none}
.conditional-area.show{display:block}
.conditional-area .ca-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.conditional-area .ca-row label{font-size:12px;color:#666}
.conditional-area input[type="range"]{flex:1 1 120px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:8px 22px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#e67e22;color:#fff}
.btn-primary:hover:not(:disabled){background:#d35400}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover:not(:disabled){background:#1e8449}
.btn-secondary{background:#7f8c8d;color:#fff}
.btn-secondary:hover:not(:disabled){background:#5d6d7e}
.btn-outline{background:transparent;color:#666;border:1.5px solid #ccc}
.btn-outline:hover:not(:disabled){border-color:#999;color:#333}
.color-legend-wrap{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:16px}
.color-legend-wrap .legend-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.color-legend-wrap .legend-header h3{font-size:13px;color:#555;font-weight:600}
.color-legend-wrap .legend-header .color-count{font-size:11px;color:#999}
.color-legend-wrap .legend-empty{color:#bbb;font-size:13px}
.color-grid{display:flex;flex-wrap:wrap;gap:5px}
.color-chip{display:flex;align-items:center;gap:3px;padding:2px 6px 2px 2px;border-radius:4px;background:#f9f9f9;border:1px solid #eee;font-size:10px;color:#444;font-weight:500}
.color-chip .swatch{width:14px;height:14px;border-radius:2px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.color-chip .code{font-family:'SF Mono','Consolas',monospace;font-weight:600;font-size:9px}
.color-chip .count{color:#bbb;font-size:9px;margin-left:1px}
@media(max-width:640px){header h1{font-size:22px}.control-row{flex-direction:column;gap:12px}.control-group{flex:1 1 auto}.preview-row{flex-direction:column}.preview-box{flex:1 1 auto}}
footer{text-align:center;padding:14px;color:#aaa;font-size:11px}
</style>
</head>
<body>
<header><h1>🧩 拼豆图纸生成器</h1><p>上传图片 → 调参数 → 自动映射 MARD 拼豆色号</p></header>
<div class="container">
<div class="upload-area" id="uploadArea">
<div class="icon" id="uploadIcon">📁</div>
<div class="text" id="uploadText">点击上传图片 或 拖拽图片到此处</div>
<div class="hint">支持 JPG / PNG / WebP · 可旋转/镜像</div>
<input type="file" id="fileInput" accept="image/*">
</div>
<div class="preview-row">
<div class="preview-box"><h3>📷 原图</h3><div class="img-wrap" id="originalWrap"><span class="placeholder" id="originalPlaceholder">等待上传…</span><canvas id="originalCanvas" style="display:none"></canvas></div><div class="img-info" id="originalInfo"></div></div>
<div class="preview-box"><h3>🧩 拼豆图纸</h3><div class="img-wrap" id="resultWrap"><span class="placeholder" id="resultPlaceholder">上传图片后自动生成</span><canvas id="resultCanvas" style="display:none"></canvas></div><div class="img-info" id="resultInfo"></div></div>
</div>
<div class="controls">
<div class="control-row">
<div class="control-group"><label>网格密度：<span class="val" id="gridSizeDisplay">32</span></label><input type="range" id="gridSizeSlider" min="4" max="100" value="32" step="1"><div class="range-labels"><span>4</span><span>100</span></div></div>
<div class="control-group"><label>格子大小：<span class="val" id="cellSizeDisplay">16</span>px</label><input type="range" id="cellSizeSlider" min="6" max="40" value="16" step="1"><div class="range-labels"><span>小</span><span>大</span></div></div>
<div class="control-group"><label>色板：<span class="val" id="paletteModeDisplay">标准 221</span></label><div class="toggle-wrap"><span class="toggle-label">221色</span><div class="toggle-switch" id="paletteToggle"><div class="knob"></div></div><span class="toggle-label">291色</span></div></div>
</div>
<div class="control-row">
<div class="control-group"><label>图片变换</label><div class="btn-row"><button class="btn-icon" id="rotateLeftBtn"><span class="ico">↺</span> 左旋</button><button class="btn-icon" id="rotateRightBtn"><span class="ico">↻</span> 右旋</button><button class="btn-icon" id="mirrorBtn"><span class="ico">⇔</span> 镜像</button></div><div class="desc">旋转/镜像会重新生成图纸</div></div>
<div class="control-group"><label>显示选项</label><div class="toggle-wrap" style="margin-top:4px"><span class="toggle-label">网格线</span><div class="toggle-switch active" id="showGridToggle"><div class="knob"></div></div></div></div>
<div class="control-group"><label>素色模式</label><div class="toggle-wrap" style="margin-top:4px"><span class="toggle-label">关</span><div class="toggle-switch" id="plainToggle"><div class="knob"></div></div><span class="toggle-label">开</span></div><div class="desc">黑白线稿+色号标注，省墨环保打印</div></div>
</div>
<div class="control-row">
<div class="control-group"><label>颜色控制</label><div class="toggle-wrap"><span class="toggle-label">限制颜色数</span><div class="toggle-switch" id="colorLimitToggle"><div class="knob"></div></div></div><div class="conditional-area" id="colorLimitArea"><div class="ca-row"><label>最多 <span class="val" id="colorLimitDisplay" style="font-size:14px">10</span> 种颜色</label><input type="range" id="colorLimitSlider" min="2" max="50" value="10" step="1"><span style="font-size:10px;color:#999">用色越少越省钱 💰</span></div></div></div>
<div class="control-group" style="flex:2"><label style="opacity:0"> </label><div style="font-size:11px;color:#999;margin-top:4px">启用后只保留用量最多的 N 种颜色，其余映射到最近的颜色</div></div>
</div>
</div>
<div class="actions">
<button class="btn btn-success" id="downloadBtn" disabled>⬇ 标准图纸 PNG</button>
<!-- labeled button removed -->
<button class="btn btn-secondary" id="downloadPdfBtn" disabled>📄 导出 PDF</button>
<button class="btn btn-outline" id="resetBtn" disabled>🔄 重新选择</button>
</div>
<div class="color-legend-wrap"><div class="legend-header"><h3>🎨 使用的 MARD 拼豆色号</h3><span class="color-count" id="colorCount"></span></div><div class="color-grid" id="colorGrid"><span class="legend-empty">上传图片后这里会显示用到的色号</span></div></div>
</div>
<footer>🧩 拼豆图纸生成器</footer>
